<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>skyNode Solutions | Monitoring</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>skyNode <span>Solutions</span></h1>
    </header>

    <main>
        <section class="grid-container">
            <article class="card" id="card-cpu">
                <h3>CPU</h3>
                <span id="cpu" class="value">0%</span>
            </article>

            <article class="card" id="card-ram">
                <h3>RAM</h3>
                <span id="ram" class="value">0 GB</span>
            </article>

            <article class="card" id="card-temp">
                <h3>Temperatura</h3>
                <span id="temp" class="value">0°C</span>
            </article>
        </section>
    </main>

    <footer>
        <p>Monitoramento de Hardware em Tempo Real</p>
    </footer>

    <script src="js/dashboard.js"></script>
</body>
</html>
